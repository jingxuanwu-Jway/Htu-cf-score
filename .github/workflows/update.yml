name: 自动更新 CF 数据

on:
  schedule:
    - cron: '0 * * * *' # 每小时的第 0 分钟运行 (UTC时间)
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # ✅ 已升级：从 v3 升级到 v4，消除 Node 警告

      - name: 设置 Python 环境
        uses: actions/setup-python@v5 # ✅ 已升级：从 v4 升级到 v5，消除 Node 警告
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行抓取脚本
        run: python fetch_cf_data.py

      - name: 提交并推送到仓库
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data.json
          # 如果数据没变化就不提交，防止报错
          git commit -m "Auto-update: 更新 CF 积分榜数据" || exit 0
          
          # ✅ 新增下面这行：在 push 之前先拉取远端最新代码，防止冲突拒绝
          git pull --rebase origin main
          
          git push
