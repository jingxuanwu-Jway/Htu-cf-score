<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞赛队 CF 积分榜</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 2rem; }
        .table-hover tbody tr { cursor: pointer; } 
        .table-hover tbody tr:hover { background-color: #f1f3f5; }
        
        /* CF 官方颜色系统 */
        .cf-legendary-grandmaster { color: #FF0000 !important; font-weight: bold; }
        .cf-legendary-grandmaster::first-letter { color: #000000 !important; }
        .cf-international-grandmaster { color: #FF0000 !important; font-weight: bold; }
        .cf-grandmaster { color: #FF0000 !important; font-weight: bold; }
        .cf-international-master { color: #FF8C00 !important; font-weight: bold; }
        .cf-master { color: #FF8C00 !important; font-weight: bold; }
        .cf-candidate-master { color: #AA00AA !important; font-weight: bold; }
        .cf-expert { color: #0000FF !important; font-weight: bold; }
        .cf-specialist { color: #03A89E !important; font-weight: bold; }
        .cf-pupil { color: #008000 !important; font-weight: bold; }
        .cf-newbie { color: #808080 !important; font-weight: bold; }
        .cf-unrated { color: #000000 !important; font-weight: normal; }

        .modal-header { border-bottom: none; padding-bottom: 0; }
        /* 限制比赛名称宽度，超长显示省略号 */
        .contest-name-cell { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-1">🏆 竞赛队 CF 积分榜</h1>
        <p class="text-center text-muted mb-4">点击任意一行查看个人历史分数折线图</p >
        <p class="text-center text-muted" id="update-time">最后更新时间：加载中...</p >
        
        <div class="table-responsive shadow-sm rounded bg-white p-3">
            <table class="table table-hover align-middle text-center" id="leaderboard-table">
                <thead class="table-dark">
                    <tr>
                        <th>排名</th>
                        <th>姓名</th>
                        <th>年级</th>
                        <th>Handle</th>
                        <th>当前分数</th>
                        <th>最高分数</th>
                        <th>刷题量(AC)</th>
                        <th>最近参加的比赛</th> <th>最近表现</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="9">正在获取数据，请稍候...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header d-flex justify-content-between align-items-center">
                    <div>
                        <h3 class="modal-title d-inline-block me-2" id="modalName">姓名</h3>
                        <span class="fs-5" id="modalHandleName">Handle</span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row text-center mb-3 mt-2">
                        <div class="col-4"><h5>当前: <span id="modalCurrentRating">-</span></h5></div>
                        <div class="col-4"><h5>最高: <span id="modalMaxRating">-</span></h5></div>
                        <div class="col-4"><h5>AC数: <span id="modalSolved">-</span></h5></div>
                    </div>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%">
                        <canvas id="ratingChart"></canvas>
                    </div>
                    <div class="text-center mt-3">
                        <a id="cfProfileLink" href=" " target="_blank" class="btn btn-outline-primary btn-sm">访问主页</a >
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <script>
        let currentChart = null;
        let userDataCache = {}; 

        function getCfColorClass(rank) {
            if (!rank) return 'cf-unrated';
            const rankMap = {
                'legendary grandmaster': 'cf-legendary-grandmaster',
                'international grandmaster': 'cf-international-grandmaster',
                'grandmaster': 'cf-grandmaster',
                'international master': 'cf-international-master',
                'master': 'cf-master',
                'candidate master': 'cf-candidate-master',
                'expert': 'cf-expert',
                'specialist': 'cf-specialist',
                'pupil': 'cf-pupil',
                'newbie': 'cf-newbie'
            };
            return rankMap[rank.toLowerCase()] || 'cf-unrated';
        }

        async function loadData() {
            try {
                const response = await fetch(`data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                const updateDate = new Date(data.last_update);
                document.getElementById('update-time').innerText = `最后更新时间：${updateDate.toLocaleString()}`;

                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                data.users.forEach((user, index) => {
                    userDataCache[user.handle] = user;

                    const colorClass = getCfColorClass(user.rank);
                    
                    let changeHtml = `<span class="text-muted">0</span>`;
                    if (user.ratingChange > 0) {
                        changeHtml = `<span class="text-success fw-bold">+${user.ratingChange} ↗</span>`;
                    } else if (user.ratingChange < 0) {
                        changeHtml = `<span class="text-danger fw-bold">${user.ratingChange} ↘</span>`;
                    }

                    // 🌟 重点看这里：加回了 user.recentContest，并使用了截断样式
                    const row = `
                        <tr onclick="showUserDetail('${user.handle}')">
                            <td class="fw-bold">${index + 1}</td>
                            <td class="fw-bold">${user.name || '-'}</td>
                            <td><span class="badge bg-secondary">${user.grade || '-'}</span></td>
                            <td><span class="${colorClass}">${user.handle}</span></td>
                            <td class="fw-bold ${colorClass}">${user.rating === 0 ? '-' : user.rating}</td>
                            <td class="text-muted">${user.maxRating === 0 ? '-' : user.maxRating}</td>
                            <td class="fw-bold text-primary">${user.solvedCount}</td>
                            <td class="contest-name-cell text-muted" title="${user.recentContest || '无'}">${user.recentContest || '无'}</td>
                            <td>${changeHtml}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Failed to load data:", error);
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="9" class="text-danger">数据加载失败，请检查 data.json。</td></tr>`;
            }
        }

        async function showUserDetail(handle) {
            const user = userDataCache[handle];
            if (!user) return;

            const colorClass = getCfColorClass(user.rank);
            
            document.getElementById('modalName').innerText = user.name || user.handle;
            const handleSpan = document.getElementById('modalHandleName');
            handleSpan.innerText = `(${user.handle})`;
            handleSpan.className = `fs-5 ${colorClass}`;
            
            document.getElementById('modalCurrentRating').innerText = user.rating || '-';
            document.getElementById('modalCurrentRating').className = colorClass;
            document.getElementById('modalMaxRating').innerText = user.maxRating || '-';
            document.getElementById('modalSolved').innerText = user.solvedCount;
            document.getElementById('cfProfileLink').href = `https://codeforces.com/profile/${user.handle}`;

            const userModal = new bootstrap.Modal(document.getElementById('userModal'));
            userModal.show();

            await renderRatingChart(handle);
        }

        async function renderRatingChart(handle) {
            const ctx = document.getElementById('ratingChart').getContext('2d');
            
            if (currentChart) {
                currentChart.destroy();
            }
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

            try {
                const resp = await fetch(`https://codeforces.com/api/user.rating?handle=${handle}`);
                const json = await resp.json();
                
                if (json.status !== 'OK' || json.result.length === 0) return;

                const chartData = json.result.map(entry => ({
                    x: entry.ratingUpdateTimeSeconds * 1000,
                    y: entry.newRating
                }));

                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Rating',
                            data: chartData,
                            borderColor: '#3e95cd',
                            backgroundColor: 'rgba(62, 149, 205, 0.1)',
                            fill: true,
                            tension: 0.2,
                            borderWidth: 2,
                            pointRadius: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { type: 'time', time: { unit: 'month' } },
                            y: { grace: '5%' }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    title: (context) => new Date(context[0].raw.x).toLocaleDateString(),
                                    label: (context) => ` Rating: ${context.raw.y}`
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Failed to fetch rating history:", error);
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
