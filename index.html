<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞赛队 CF 积分榜</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 2rem; }
        .table-hover tbody tr:hover { background-color: #f1f3f5; }
        /* CF 官方颜色系统 */
        .cf-legendary-grandmaster { color: #FF0000; font-weight: bold; }
        .cf-legendary-grandmaster::first-letter { color: #000000; }
        .cf-international-grandmaster { color: #FF0000; font-weight: bold; }
        .cf-grandmaster { color: #FF0000; font-weight: bold; }
        .cf-international-master { color: #FF8C00; font-weight: bold; }
        .cf-master { color: #FF8C00; font-weight: bold; }
        .cf-candidate-master { color: #AA00AA; font-weight: bold; }
        .cf-expert { color: #0000FF; font-weight: bold; }
        .cf-specialist { color: #03A89E; font-weight: bold; }
        .cf-pupil { color: #008000; font-weight: bold; }
        .cf-newbie { color: #808080; font-weight: bold; }
        .cf-unrated { color: #000000; font-weight: normal; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🏆 竞赛队 Codeforces 实时积分榜</h1>
        <p class="text-center text-muted" id="update-time">最后更新时间：加载中...</p >
        
        <div class="table-responsive shadow-sm rounded bg-white p-3">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>排名</th>
                        <th>Handle</th>
                        <th>当前分数</th>
                        <th>最高分数</th>
                        <th>刷题量 (AC)</th>
                        <th>最近比赛</th>
                        <th>最近表现</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="7">正在获取数据，请稍候...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 根据段位名称返回对应的 CSS 类名
        function getCfColorClass(rank) {
            if (!rank) return 'cf-unrated';
            const rankMap = {
                'legendary grandmaster': 'cf-legendary-grandmaster',
                'international grandmaster': 'cf-international-grandmaster',
                'grandmaster': 'cf-grandmaster',
                'international master': 'cf-international-master',
                'master': 'cf-master',
                'candidate master': 'cf-candidate-master',
                'expert': 'cf-expert',
                'specialist': 'cf-specialist',
                'pupil': 'cf-pupil',
                'newbie': 'cf-newbie'
            };
            return rankMap[rank.toLowerCase()] || 'cf-unrated';
        }

        async function loadData() {
            try {
                // 读取同目录下的 data.json，加上时间戳防止浏览器缓存老数据
                const response = await fetch(`data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                // 格式化更新时间
                const updateDate = new Date(data.last_update);
                document.getElementById('update-time').innerText = `最后更新时间：${updateDate.toLocaleString()}`;

                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';

                data.users.forEach((user, index) => {
                    const colorClass = getCfColorClass(user.rank);
                    
                    // 分数变化格式化 (涨分用绿色带+, 掉分用红色)
                    let changeHtml = `<span class="text-muted">0</span>`;
                    if (user.ratingChange > 0) {
                        changeHtml = `<span class="text-success fw-bold">+${user.ratingChange} ↗</span>`;
                    } else if (user.ratingChange < 0) {
                        changeHtml = `<span class="text-danger fw-bold">${user.ratingChange} ↘</span>`;
                    }

                    const row = `
                        <tr>
                            <td class="fw-bold">${index + 1}</td>
                            <td><a href=" " target="_blank" class="text-decoration-none ${colorClass}">${user.handle}</a ></td>
                            <td class="fw-bold ${colorClass}">${user.rating === 0 ? '-' : user.rating}</td>
                            <td class="text-muted">${user.maxRating === 0 ? '-' : user.maxRating}</td>
                            <td class="fw-bold text-primary">${user.solvedCount}</td>
                            <td class="text-truncate" style="max-width: 200px;" title="${user.recentContest}">${user.recentContest}</td>
                            <td>${changeHtml}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("加载数据失败:", error);
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="7" class="text-danger">数据加载失败，请检查 data.json 是否存在。</td></tr>`;
            }
        }

        // 页面加载完成后立即执行
        window.onload = loadData;
    </script>
</body>
</html>
